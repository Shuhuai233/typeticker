name: Export Windows Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  export-windows:
    name: Export Windows
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Export with Godot
        uses: dulvui/godot-ci@v4
        with:
          godot-version: "4.2.2"
          working-directory: "."
          export-preset: "Windows Desktop"
          export-path: "build/typeticker.exe"

      - name: Zip Windows build
        run: |
          cd build
          zip -r ../typeticker-windows.zip typeticker.exe typeticker.pck

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: typeticker-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload as artifact (for manual runs)
        uses: actions/upload-artifact@v4
        with:
          name: typeticker-windows
          path: typeticker-windows.zip
